name: Release binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          version="$(sed -n '/^\[package\]/,/^\[/s/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)"
          if [[ -z "$version" ]]; then
            echo "Unable to resolve package version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            release_name="${GITHUB_REF_NAME}"
            prerelease=false
          else
            short_sha="${GITHUB_SHA::12}"

            if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              prefix="main"
              label="main build"
            else
              safe_ref="$(echo "${GITHUB_REF_NAME}" | tr -cs 'A-Za-z0-9._-' '-')"
              prefix="preview-${safe_ref}"
              label="preview ${safe_ref}"
            fi

            release_tag="${prefix}-v${version}-${short_sha}"
            release_name="${label} v${version} (${short_sha})"
            prerelease=true
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "prerelease=${prerelease}"
          } >> "$GITHUB_OUTPUT"

  create-release:
    name: Create GitHub release
    needs: prepare-release
    runs-on: ubuntu-24.04

    steps:
      - name: Create release when missing
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.prepare-release.outputs.release_name }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists"
            exit 0
          fi

          args=(
            "$RELEASE_TAG"
            --title "$RELEASE_NAME"
            --target "$GITHUB_SHA"
            --generate-notes
          )

          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"

  build:
    name: Build ${{ matrix.artifact }}
    needs:
      - prepare-release
      - create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: acli-linux-x86_64
            binary: acli
            archive: acli-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: acli-linux-arm64
            binary: acli
            archive: acli-linux-arm64.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: acli-macos-x86_64
            binary: acli
            archive: acli-macos-x86_64.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: acli-macos-arm64
            binary: acli
            archive: acli-macos-arm64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: acli-windows-x86_64
            binary: acli.exe
            archive: acli-windows-x86_64.zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact: acli-windows-arm64
            binary: acli.exe
            archive: acli-windows-arm64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Test
        run: cargo test --locked --target "${{ matrix.target }}"

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Smoke test Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: ./target/${{ matrix.target }}/release/${{ matrix.binary }} --help >/dev/null

      - name: Smoke test Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "target/${{ matrix.target }}/release/${{ matrix.binary }}" --help | Out-Null

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.artifact }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}/"
          cp README.md "dist/${{ matrix.artifact }}/"
          tar -czf "dist/${{ matrix.archive }}" -C dist "${{ matrix.artifact }}"
          shasum -a 256 "dist/${{ matrix.archive }}" > "dist/${{ matrix.archive }}.sha256"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.artifact }}" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}/"
          Copy-Item "README.md" "dist/${{ matrix.artifact }}/"
          Compress-Archive -Path "dist/${{ matrix.artifact }}" -DestinationPath "dist/${{ matrix.archive }}" -Force
          (Get-FileHash "dist/${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.archive }}" |
            Set-Content "dist/${{ matrix.archive }}.sha256" -NoNewline

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256
          if-no-files-found: error

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "dist/${{ matrix.archive }}" \
            "dist/${{ matrix.archive }}.sha256" \
            --clobber
