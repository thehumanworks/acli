name: Build binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: acli-linux-x86_64
            binary: acli
            archive: acli-linux-x86_64.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: acli-macos-x86_64
            binary: acli
            archive: acli-macos-x86_64.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: acli-macos-aarch64
            binary: acli
            archive: acli-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: acli-windows-x86_64
            binary: acli.exe
            archive: acli-windows-x86_64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.artifact }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}/"
          cp README.md "dist/${{ matrix.artifact }}/"
          tar -czf "dist/${{ matrix.archive }}" -C dist "${{ matrix.artifact }}"
          shasum -a 256 "dist/${{ matrix.archive }}" > "dist/${{ matrix.archive }}.sha256"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.artifact }}" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}/"
          Copy-Item "README.md" "dist/${{ matrix.artifact }}/"
          Compress-Archive -Path "dist/${{ matrix.artifact }}" -DestinationPath "dist/${{ matrix.archive }}" -Force
          (Get-FileHash "dist/${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.archive }}" |
            Set-Content "dist/${{ matrix.archive }}.sha256" -NoNewline

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 ||
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Automated release for ${GITHUB_REF_NAME}"
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/${{ matrix.archive }}" \
            "dist/${{ matrix.archive }}.sha256" \
            --clobber
