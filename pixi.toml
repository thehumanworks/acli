[workspace]
authors = ["agentmish <rodat.dev@proton.me>"]
channels = ["conda-forge"]
name = "acli"
platforms = ["osx-arm64", "linux-64", "linux-aarch64", "win-64", "win-arm64"]
version = "0.1.0"

[pypi-options]
index-url = "https://pypi.org/simple"
extra-index-urls = ["https://pypi.org/simple2"]

[tasks]
build = "cargo build --release --locked"
test = "cargo test --locked"
cli = "cargo run --release --locked --"

[dependencies]
rust = "*"
